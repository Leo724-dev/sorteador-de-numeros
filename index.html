<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sorteador de Números</title>
</head>
<body>

    <div>
        <img src="img/dado.png" alt="dado">
    
    <h2>Sortear um número</h2>

    <div class="inputs">
        <input type="number" name="num" id="num" placeholder="Entre">

        <input type="number" name="num2" id="num2" placeholder="E">

        <p class="resultado">O Número sorteado foi: <span>20</span></p>
    </div>

    <button type="submit" id="sortear">Sortear</button>
    </div>
    
</body>
<script src="script.js"></script>
</html>
